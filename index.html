<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amınoğlu Hesapmatik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background-color: #f4f7f6; font-family: sans-serif; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #2c3e50; border: none; padding: 12px; font-weight: bold; }
        .result-box { background-color: #e8f4fd; border-radius: 10px; padding: 15px; margin-top: 20px; display: none; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h3 class="text-center mb-4 text-primary">Amınoğlu Hesapmatik 🛠️</h3>
                
                <div id="reader"></div>
                <button id="cameraBtn" onclick="kamerayiAc()" class="btn btn-outline-secondary w-100 mb-3">📸 Barkod Tara</button>

                <div class="mb-3">
                    <label class="form-label">Barkod / Etiket No</label>
                    <input type="text" id="barkodNo" class="form-control form-control-lg" placeholder="Barkod okutun veya yazın">
                </div>

                <div class="mb-3">
                    <label class="form-label">Demir Çapı (mm)</label>
                    <select id="cap" class="form-select form-select-lg"></select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Boy (Metre)</label>
                    <select id="boy" class="form-select form-select-lg"></select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Toplam Tonaj (Ton)</label>
                    <input type="number" id="tonaj" class="form-control form-control-lg" placeholder="Örn: 2" step="0.001">
                </div>

                <button onclick="hesapla()" class="btn btn-primary w-100 mt-3">ADET HESAPLA</button>

                <div id="sonucAlani" class="result-box text-center">
                    <h5 class="mb-1 text-secondary">Tahmini Çubuk Sayısı:</h5>
                    <h2 id="sonuc" class="text-primary fw-bold">0</h2>
                    <small class="text-muted" id="detay"></small>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Çap ve Boy Listeleri (Öncekiyle aynı)
    const capSelect = document.getElementById('cap');
    const boySelect = document.getElementById('boy');
    for (let i = 8; i <= 20; i += 0.5) capSelect.options.add(new Option(i + " mm", i));
    for (let i = 22; i <= 50; i += 2) capSelect.options.add(new Option(i + " mm", i));
    for (let i = 6; i <= 18; i++) boySelect.options.add(new Option(i + " Metre", i));

    // Kamera Fonksiyonu
    function kamerayiAc() {
        document.getElementById('reader').style.display = 'block';
        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 250, height: 250 } },
            (decodedText) => {
                document.getElementById('barkodNo').value = decodedText;
                html5QrCode.stop();
                document.getElementById('reader').style.display = 'none';
            }
        ).catch(err => alert("Kamera izni gerekiyor!"));
    }

    function hesapla() {
        const cap = parseFloat(document.getElementById('cap').value);
        const boy = parseFloat(document.getElementById('boy').value);
        const tonaj = parseFloat(document.getElementById('tonaj').value);

        if (!tonaj) { alert("Tonaj girin!"); return; }

        const birimAgirlik = (Math.pow(cap, 2) / 162.15);
        const adet = Math.floor((tonaj * 1000) / (boy * birimAgirlik));

        document.getElementById('sonucAlani').style.display = 'block';
        document.getElementById('sonuc').innerText = adet + " Adet";
        document.getElementById('detay').innerText = `Barkod: ${document.getElementById('barkodNo').value || 'Girilmedi'}`;
    }
</script>
</body>
</html>
