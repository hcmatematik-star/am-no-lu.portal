<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amınoğlu Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bwip-js@3.0.4/dist/bwip-js-min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #0d0d0d; color: #eee; font-family: sans-serif; overflow: hidden; }
        .main-header { color: #ff4757; font-weight: 900; font-size: 2.2rem; cursor: pointer; text-align: center; margin-top: 50px; user-select: none; }
        .menu-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; }
        .app-page { display: none; padding: 20px; height: 100vh; background: #0d0d0d; position: fixed; top: 0; left: 0; width: 100%; z-index: 100; }
        .back-btn { background: #222; color: #ff4757; border: 1px solid #444; padding: 8px 15px; border-radius: 8px; margin-bottom: 25px; }
        #codeEditor { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e1e1e; z-index: 10000; display: none; flex-direction: column; }
        #rawArea { flex-grow: 1; background: #1e1e1e; color: #d4d4d4; font-family: monospace; padding: 15px; border: none; outline: none; font-size: 11px; }
    </style>
</head>
<body>

<div class="container" id="mainLayout">
    <h1 class="main-header mb-5" onclick="triggerMagic()">AMINOĞLU PORTAL</h1>
    
    <div class="row g-3">
        <div class="col-6" onclick="openApp('ictas')"><div class="menu-card">🔳<br>İçtaş Barkod</div></div>
        <div class="col-6" onclick="openApp('idris')"><div class="menu-card">📊<br>İdis Barkod</div></div>
        <div class="col-6" onclick="openApp('read')"><div class="menu-card">🔍<br>Barkod İçerik</div></div>
        <div class="col-6" onclick="openApp('calc')"><div class="menu-card">⚖️<br>Çubuk Sayısı</div></div>
    </div>
    </div>

<div id="codeEditor">
    <div class="bg-dark p-2 d-flex justify-content-between border-bottom border-secondary">
        <span class="text-muted small">index.html</span>
        <button class="btn btn-sm btn-success" onclick="save()">SAVE</button>
    </div>
    <textarea id="rawArea" spellcheck="false"></textarea>
</div>

<div id="calc" class="app-page">
    <button class="back-btn" onclick="showMenu()">← GERİ</button>
    <div class="card bg-dark border-secondary p-4">
        <input type="number" id="d" class="form-control mb-3" placeholder="Çap">
        <input type="number" id="l" class="form-control mb-3" placeholder="Boy">
        <input type="number" id="w" class="form-control mb-4" placeholder="Ağırlık">
        <button onclick="calcSteel()" class="btn btn-danger w-100">HESAPLA</button>
        <div id="res" class="mt-4 text-center h1 text-danger"></div>
    </div>
</div>

<script>
    /* yerel sunucu olmadığı için yavaş çalışıyor ve fotoğraflar net olmadığında saçma çıktılar verdiği için devre dışı bıraktım. barkod numarası sadece manuel girilecek
    */
    
    /* function cameraScan() {
       // navigator.mediaDevices.getUserMedia...
    }
    */

    let clicks = 0;
    function triggerMagic() {
        clicks++;
        if(clicks === 3) {
            document.getElementById('rawArea').value = document.documentElement.outerHTML;
            document.getElementById('codeEditor').style.display = 'flex';
            clicks = 0;
        }
    }

    function openApp(id) { document.getElementById('mainLayout').style.display = 'none'; document.getElementById(id).style.display = 'block'; }
    function showMenu() { document.querySelectorAll('.app-page').forEach(p => p.style.display = 'none'); document.getElementById('mainLayout').style.display = 'block'; }

    function calcSteel() {
        let cap = parseFloat(document.getElementById('d').value);
        let boy = parseFloat(document.getElementById('l').value);
        let kg = parseFloat(document.getElementById('w').value);
        if(cap && boy && kg) {
            let r = Math.floor(kg / (boy * ((cap * cap) / 162.15)));
            document.getElementById('res').innerText = r + " ADET";
        }
    }

    function save() {
        let p = prompt("Şifre:");
        if(p === "1903") {
            alert("Kaydedildi.");
            location.reload();
        }
    }
    
    // © 2026 Copyright Harun Camuzcu 
</script>
</body>
</html>
