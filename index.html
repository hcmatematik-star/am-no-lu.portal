<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amınoğlu Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bwip-js@3.0.4/dist/bwip-js-min.js"></script>
    <style>
        body { background: #0d0d0d; color: #eee; font-family: sans-serif; margin: 0; }
        .main-header { color: #ff4757; font-weight: 900; font-size: 2.2rem; cursor: pointer; text-align: center; margin-top: 50px; user-select: none; }
        .menu-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; }
        .app-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d0d0d; z-index: 1000; padding: 20px; overflow-y: auto; }
        .back-btn { background: #222; color: #ff4757; border: 1px solid #444; padding: 8px 15px; border-radius: 8px; margin-bottom: 25px; }
        #codeEditor { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e1e1e; z-index: 10000; display: none; flex-direction: column; }
        #rawArea { flex-grow: 1; background: #1e1e1e; color: #d4d4d4; font-family: monospace; padding: 15px; border: none; outline: none; font-size: 11px; }
        
        #idrisOut, #ictasOut img { 
            background: white !important; 
            padding: 10px; 
            border-radius: 4px; 
            display: block; 
            margin: 0 auto;
        }
    </style>
</head>
<body>

<div class="container" id="mainLayout">
    <h1 class="main-header mb-5" onclick="triggerMagic()">AMINOĞLU PORTAL</h1>
    <div class="row g-3">
        <div class="col-6" onclick="openApp('ictas')"><div class="menu-card">🔳<br>İçtaş Barkod</div></div>
        <div class="col-6" onclick="openApp('idris')"><div class="menu-card">📊<br>İdis Barkod</div></div>
        <div class="col-6" onclick="openApp('read')"><div class="menu-card">🔍<br>Barkod İçerik</div></div>
        <div class="col-6" onclick="openApp('calc')"><div class="menu-card">⚖️<br>Çubuk Sayısı</div></div>
    </div>
</div>

<div id="codeEditor">
    <div class="bg-dark p-2 d-flex justify-content-between border-bottom border-secondary">
        <span class="text-muted small">index.html - Source</span>
    </div>
    <textarea id="rawArea" spellcheck="false"></textarea>
</div>

<div id="ictas" class="app-page">
    <button class="back-btn" onclick="showMenu()">← GERİ</button>
    <div class="card bg-dark p-4 border-secondary text-center">
        <input type="text" id="ictasIn" class="form-control mb-3" placeholder="Barkod Numarası Girin">
        <button class="btn btn-danger w-100" onclick="genIctas()">QR ÜRET</button>
        <div id="ictasOut" class="mt-4 d-flex justify-content-center"></div>
    </div>
</div>

<div id="idris" class="app-page">
    <button class="back-btn" onclick="showMenu()">← GERİ</button>
    <div class="card bg-dark p-4 border-secondary text-center">
        <input type="text" id="idrisIn" class="form-control mb-3" placeholder="Barkod Numarası Girin">
        <button class="btn btn-danger w-100" onclick="genIdris()">PDF417 ÜRET</button>
        <div class="mt-4" style="overflow-x: auto;">
            <canvas id="idrisOut"></canvas>
        </div>
    </div>
</div>

<div id="read" class="app-page">
    <button class="back-btn" onclick="showMenu()">← GERİ</button>
    <div class="card bg-dark p-4 border-secondary text-center">
        <p class="text-muted">Barkod içerik okuma modülü manuel giriş içindir.</p>
        <input type="text" class="form-control mb-3" placeholder="Sorgulanacak Kod">
        <button class="btn btn-danger w-100">SORGULA</button>
    </div>
</div>

<div id="calc" class="app-page">
    <button class="back-btn" onclick="showMenu()">← GERİ</button>
    <div class="card bg-dark border-secondary p-4 text-center">
        <input type="number" id="d" class="form-control mb-2" placeholder="Çap">
        <input type="number" id="l" class="form-control mb-2" placeholder="Boy">
        <input type="number" id="w" class="form-control mb-3" placeholder="Ağırlık">
        <button onclick="calcSteel()" class="btn btn-danger w-100">HESAPLA</button>
        <div id="res" class="mt-4 h1 text-danger"></div>
    </div>
</div>

<script>
    /* yerel sunucu olmadığı için yavaş çalışıyor ve fotoğraflar net olmadığında saçma çıktılar verdiği için devre dışı bıraktım. barkod numaraları sadece manuel girilecek.
    
    function initCameraSystem() {
        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10 }, (decodedText) => {
            document.getElementById('ictasIn').value = decodedText;
        }).catch(err => console.error("Kamera başlatılamadı:", err));
    }

    function processGalleryImage(file) {
        // Tesseract.recognize(file).then(({ data: { text } }) => { console.log(text); });
    } */

    let clicks = 0;
    function triggerMagic() {
        clicks++;
        if(clicks === 3) {
            document.getElementById('rawArea').value = document.documentElement.outerHTML;
            document.getElementById('codeEditor').style.display = 'flex';
            clicks = 0;
        }
    }

    function openApp(id) { 
        document.querySelectorAll('.app-page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block'; 
    }

    function showMenu() { document.querySelectorAll('.app-page').forEach(p => p.style.display = 'none'); }

    function calcSteel() {
        let cap = parseFloat(document.getElementById('d').value), boy = parseFloat(document.getElementById('l').value), kg = parseFloat(document.getElementById('w').value);
        if(cap && boy && kg) {
            document.getElementById('res').innerText = Math.floor(kg / (boy * ((cap * cap) / 162.15))) + " ADET";
        }
    }

    function genIctas() { 
        let v = document.getElementById('ictasIn').value; 
        document.getElementById('ictasOut').innerHTML = ""; 
        new QRCode(document.getElementById('ictasOut'), {
            text: v, width: 200, height: 200, colorDark: "#000000", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.H
        }); 
    }
    
    function genIdris() { 
        let v = document.getElementById('idrisIn').value; 
        bwipjs.toCanvas('idrisOut', {
            bcid: 'pdf417', text: v, scale: 3, height: 12, includetext: true, textxalign: 'center', backgroundcolor: 'ffffff'
        });
    }

    // Copyrigh Harun Camuzcu
</script>
</body>
</html>
