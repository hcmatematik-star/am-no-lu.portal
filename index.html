<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amınoğlu Metal Portal v7</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bwip-js@3.0.4/dist/bwip-js-min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { background-color: #0d0d0d; color: white; font-family: 'Segoe UI', sans-serif; }
        .menu-card { background: #1a1a1a; border: 2px solid #333; border-radius: 25px; cursor: pointer; padding: 40px 20px; text-align: center; transition: 0.3s; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .menu-card:hover { border-color: #ff4757; transform: scale(1.03); }
        .icon-box { font-size: 3.5rem; margin-bottom: 15px; }
        .app-page { display: none; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .back-btn { background: #ff4757; color: white; border: none; padding: 10px 20px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; }
        .form-control-custom { background: white !important; color: black !important; border: 3px solid #ff4757; border-radius: 15px; padding: 15px; font-size: 1.5rem; font-weight: 900; text-align: center; }
        .btn-action { background: #ff4757; color: white; border: none; padding: 18px; border-radius: 15px; font-weight: bold; width: 100%; font-size: 1.2rem; }
        .barcode-area { background: white; padding: 25px; border-radius: 20px; display: inline-block; margin-top: 20px; }
        #reader { width: 100%; border-radius: 20px; overflow: hidden; border: 2px solid #ff4757; display: none; }
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; text-align: center; padding-top: 50%; }
        canvas#preprocess { display: none; } /* Görseli temizleme alanı */
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner-border text-danger" role="status"></div>
    <div class="mt-3 fw-bold">Gürültü Temizleniyor... <br> Sadece Numaraya Odaklanılıyor...</div>
</div>

<canvas id="preprocess"></canvas>

<div class="container py-5">
    <div id="mainMenu">
        <h1 class="text-center mb-5" style="color: #ff4757; font-weight: 900;">AMINOĞLU PORTAL</h1>
        <div class="row g-4">
            <div class="col-6 col-md-3"><div class="menu-card" onclick="openApp('ictasPage')"><div class="icon-box">🔳</div><h5 class="fw-bold">İçtaş Barkod</h5></div></div>
            <div class="col-6 col-md-3"><div class="menu-card" onclick="openApp('idrisPage')"><div class="icon-box">📊</div><h5 class="fw-bold">İdis Barkod</h5></div></div>
            <div class="col-6 col-md-3"><div class="menu-card" onclick="openApp('readPage')"><div class="icon-box">🔍</div><h5 class="fw-bold">Barkod İçerik</h5></div></div>
            <div class="col-6 col-md-3"><div class="menu-card" onclick="openApp('calcPage')"><div class="icon-box">🏗️</div><h5 class="fw-bold">Çubuk Sayısı</h5></div></div>
        </div>
    </div>

    <div id="ictasPage" class="app-page">
        <button class="back-btn" onclick="showMenu()">← Ana Menü</button>
        <div class="card bg-dark p-4 border-0">
            <h3 class="text-center mb-4 text-white">İçtaş Barkod Üret</h3>
            <label class="btn btn-outline-light w-100 p-3 mb-4 fw-bold">📸 Fotoğraf Çek / Yükle <input type="file" accept="image/*" onchange="ultraOCR(this, 'ictasInput')" hidden></label>
            <input type="text" id="ictasInput" class="form-control form-control-custom mb-3" placeholder="Numara Buraya Gelecek">
            <button onclick="genQR()" class="btn btn-action">QR OLUŞTUR 🚀</button>
            <div id="qrOut" class="text-center mt-3" style="display:none;"><div class="barcode-area" id="qrcode"></div></div>
        </div>
    </div>

    <div id="idrisPage" class="app-page">
        <button class="back-btn" onclick="showMenu()">← Ana Menü</button>
        <div class="card bg-dark p-4 border-0">
            <h3 class="text-center mb-4 text-white">İdis Barkod Üret</h3>
            <label class="btn btn-outline-light w-100 p-3 mb-4 fw-bold">📸 Fotoğraf Çek / Yükle <input type="file" accept="image/*" onchange="ultraOCR(this, 'idrisInput')" hidden></label>
            <input type="text" id="idrisInput" class="form-control form-control-custom mb-3" placeholder="Numara Buraya Gelecek">
            <button onclick="genPDF()" class="btn btn-action">PDF417 OLUŞTUR 🚀</button>
            <div id="pdfOut" class="text-center mt-3" style="display:none;"><div class="barcode-area"><canvas id="pdfCanvas"></canvas></div></div>
        </div>
    </div>

    </div>

<script>
    // Menü ve Temel Fonksiyonlar aynı...
    function openApp(id) { document.getElementById('mainMenu').style.display = 'none'; document.getElementById(id).style.display = 'block'; }
    function showMenu() { document.querySelectorAll('.app-page').forEach(p => p.style.display = 'none'); document.getElementById('mainMenu').style.display = 'block'; }

    // ULTRA OCR - Gelişmiş Filtreleme
    async function ultraOCR(input, targetId) {
        const file = input.files[0];
        if(!file) return;
        document.getElementById('loader').style.display = 'block';

        const worker = await Tesseract.createWorker();
        await worker.loadLanguage('eng');
        await worker.initialize('eng');
        // Sadece harf ve rakam, barkod çizgilerini karıştırma ihtimalini azaltır
        await worker.setParameters({ tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789' });

        const { data: { text } } = await worker.recognize(file);
        
        // TEMİZLEME MANTIĞI: 
        // 1. Tüm boşlukları sil
        // 2. Sadece 6 ile 12 karakter arası olan dizileri al (Barkod numaraları genelde bu aralıktadır)
        // 3. Çok uzun olanları (barkod çizgileri) ele.
        const words = text.split(/\s+/);
        let found = "";
        
        for (let word of words) {
            let clean = word.replace(/[^A-Z0-9]/g, '');
            if (clean.length >= 7 && clean.length <= 11) {
                found = clean;
                break;
            }
        }

        if(found) {
            document.getElementById(targetId).value = found;
        } else {
            alert("Numara net ayıklanamadı. Lütfen barkodu değil, sadece rakamları içeren bölgeyi çekin.");
        }
        
        await worker.terminate();
        document.getElementById('loader').style.display = 'none';
    }

    // Diğer Üretme ve Hesaplama fonksiyonları (v6 ile aynı)
    function genQR() {
        let v = document.getElementById('ictasInput').value.trim();
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById('qrcode'), { text: v, width: 220, height: 220 });
        document.getElementById('qrOut').style.display = 'block';
    }
    function genPDF() {
        let v = document.getElementById('idrisInput').value.trim();
        bwipjs.toCanvas('pdfCanvas', { bcid: 'pdf417', text: v, scale: 3, height: 12 });
        document.getElementById('pdfOut').style.display = 'block';
    }
    // ... Hesaplama ve Scanner kodlarını buraya eklemeyi unutma
</script>
</body>
</html>
