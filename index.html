<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amınoğlu Barkod Kurtarıcı</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; }
        .card { background-color: #2d2d2d; border-radius: 20px; border: 1px solid #444; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .form-control-lg { background-color: #3d3d3d; border: 1px solid #555; color: white !important; }
        .form-control-lg::placeholder { color: #888; }
        .btn-create { background-color: #ff4757; border: none; padding: 15px; font-weight: bold; font-size: 1.2rem; color: white; transition: 0.3s; }
        .btn-create:hover { background-color: #ff6b81; }
        #qrcode { background-color: white; padding: 20px; border-radius: 10px; display: inline-block; margin-top: 20px; }
        .result-container { display: none; text-align: center; margin-top: 30px; padding: 20px; background: #333; border-radius: 15px; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h2 class="text-center mb-4" style="color: #ff4757;">Amınoğlu Barkod Kurtarıcı</h2>
                
                <div class="mb-4">
                    <label class="form-label text-light">Hasarlı Barkod Numarası:</label>
                    <input type="text" id="barkodInput" class="form-control form-control-lg text-center" placeholder="Örn: B1260026122">
                </div>

                <button onclick="uret()" class="btn btn-create w-100 shadow-lg">KAREKODU OLUŞTUR 🚀</button>

                <div id="sonucAlani" class="result-container">
                    <p class="text-light mb-2">Terminal İçin Okutunuz:</p>
                    <div id="qrcode"></div>
                    <h4 id="noText" class="mt-3 text-warning"></h4>
                    <small class="text-muted d-block mt-2">Ekran parlaklığını artırmayı unutmayın.</small>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function uret() {
        var metin = document.getElementById("barkodInput").value.trim();
        var alan = document.getElementById("qrcode");
        var sonucAlani = document.getElementById("sonucAlani");
        var noText = document.getElementById("noText");

        if(metin === "") {
            alert("Boş bırakamazsın kardeşim, numarayı yaz hele!");
            return;
        }

        // Temizlik
        alan.innerHTML = "";
        
        // Karekod Üretimi
        new QRCode(alan, {
            text: metin,
            width: 250,
            height: 250,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        // Görünür yap
        sonucAlani.style.display = "block";
        noText.innerText = metin;
        
        // Odağı butondan çek (klavye kapansın diye)
        document.activeElement.blur();
    }
</script>

</body>
</html>
