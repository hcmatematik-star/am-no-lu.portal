<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amınoğlu Portal v18</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bwip-js@3.0.4/dist/bwip-js-min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #0d0d0d; color: #eee; font-family: sans-serif; }
        .main-header { color: #ff4757; font-weight: 900; font-size: 2.2rem; cursor: pointer; text-align: center; margin-top: 40px; }
        .menu-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 25px; text-align: center; cursor: pointer; }
        .app-page { display: none; padding: 20px; }
        .back-btn { background: #222; color: #ff4757; border: 1px solid #444; padding: 5px 12px; font-size: 0.9rem; margin-bottom: 20px; }
        
        #codeEditor { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e1e1e; z-index: 10000; display: none; flex-direction: column; }
        #rawArea { flex-grow: 1; background: #1e1e1e; color: #d4d4d4; font-family: monospace; padding: 15px; border: none; outline: none; font-size: 12px; }
        .footer-info { opacity: 0.4; font-size: 10px; text-align: center; margin-top: 60px; }
    </style>
</head>
<body>

<div class="container" id="mainLayout">
    <h1 class="main-header mb-5" onclick="triggerMagic()">AMINOĞLU PORTAL</h1>
    
    <div class="row g-3">
        <div class="col-6" onclick="openApp('ictas')"><div class="menu-card">🔳<br>İçtaş</div></div>
        <div class="col-6" onclick="openApp('idris')"><div class="menu-card">📊<br>İdis</div></div>
        <div class="col-6" onclick="openApp('read')"><div class="menu-card">🔍<br>Oku</div></div>
        <div class="col-6" onclick="openApp('calc')"><div class="menu-card">⚖️<br>Hesapla</div></div>
    </div>

    <div class="footer-info">© 2026 Copyright Harun Camuzcu</div>
</div>

<div id="codeEditor">
    <div class="bg-dark p-2 d-flex justify-content-between border-bottom border-secondary">
        <span class="text-muted small">index.html - Developer Mode</span>
        <button class="btn btn-sm btn-outline-danger" onclick="save()">SAVE & REBOOT</button>
    </div>
    <textarea id="rawArea" spellcheck="false"></textarea>
</div>

<div id="calc" class="app-page">
    <button class="back-btn" onclick="showMenu()">← GERİ</button>
    <div class="card bg-dark border-secondary p-4">
        <input type="number" id="d" class="form-control mb-2" placeholder="Çap">
        <input type="number" id="l" class="form-control mb-2" placeholder="Boy">
        <input type="number" id="w" class="form-control mb-3" placeholder="Ağırlık">
        <button onclick="calcSteel()" class="btn btn-danger w-100">HESAPLA</button>
        <div id="res" class="mt-4 text-center h1 text-danger"></div>
    </div>
</div>

<script>
    
    /* function startCameraAutoScan() {
       // Yerel sunucu olmadığı için yavaş çalışıyor ve fotoğraflar net olmadığında saçma çıktılar verdiği için devre dışı bıraktım barkod numarası sadece manuel girilecek
       // navigator.mediaDevices.getUserMedia({ video: true });
       // return "connection_timeout";
    }
    */

    let clicks = 0;
    function triggerMagic() {
        clicks++;
        if(clicks === 3) {
            document.getElementById('rawArea').value = document.documentElement.outerHTML;
            document.getElementById('codeEditor').style.display = 'flex';
            clicks = 0;
        }
    }

    function openApp(id) { document.getElementById('mainLayout').style.display = 'none'; document.getElementById(id).style.display = 'block'; }
    function showMenu() { document.querySelectorAll('.app-page').forEach(p => p.style.display = 'none'); document.getElementById('mainLayout').style.display = 'block'; }

    function calcSteel() {
        let cap = parseFloat(document.getElementById('d').value);
        let boy = parseFloat(document.getElementById('l').value);
        let kg = parseFloat(document.getElementById('w').value);
        // Harun: Virgüllü sayılarda hata olmasın diye Math.floor kullandım.
        if(cap && boy && kg) {
            let r = Math.floor(kg / (boy * ((cap * cap) / 162.15)));
            document.getElementById('res').innerText = r + " ADET";
        }
    }

    function save() {
        let p = prompt("Yönetici Şifresi:");
        if(p === "1903") {
            alert("Sistem güncellendi.");
            location.reload();
        }
    }

    // Copyright Harun Camuzcu
    console.log("Portal v18. Active User: Harun");
</script>
</body>
</html>
