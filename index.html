<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amınoğlu Metal Portal v9</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bwip-js@3.0.4/dist/bwip-js-min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background-color: #0d0d0d; color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .menu-card { background: #1a1a1a; border: 2px solid #333; border-radius: 25px; transition: 0.3s; cursor: pointer; padding: 40px 20px; text-align: center; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .menu-card:hover { border-color: #ff4757; transform: scale(1.03); background: #222; }
        .icon-box { font-size: 3.5rem; margin-bottom: 15px; }
        .app-page { display: none; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .back-btn { background: #ff4757; color: white; border: none; padding: 10px 20px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; }
        .form-control-custom { background: white !important; color: black !important; border: 3px solid #ff4757; border-radius: 15px; padding: 15px; font-size: 1.5rem; font-weight: 800; text-align: center; }
        .btn-action { background: #ff4757; color: white; border: none; padding: 18px; border-radius: 15px; font-weight: bold; width: 100%; font-size: 1.2rem; }
        .barcode-area { background: white; padding: 25px; border-radius: 20px; display: inline-block; margin-top: 20px; }
        #reader { width: 100%; border-radius: 20px; overflow: hidden; border: 2px solid #ff4757; display: none; }
        
        /* Hesaplama Alanı Stilleri */
        .calc-label { font-weight: bold; color: #aaa; margin-bottom: 5px; display: block; }
        .form-select-lg, .form-control-lg { background-color: #2a2a2a !important; border: 1px solid #444 !important; color: white !important; border-radius: 12px; height: 60px; font-weight: bold; }
        .form-control-lg::placeholder { color: #666; }
        .input-group-text-custom { background: #333; border: 1px solid #444; color: #888; border-radius: 0 12px 12px 0; font-weight: bold; }
    </style>
</head>
<body>

<div class="container py-5">
    <div id="mainMenu">
        <h1 class="text-center mb-5" style="color: #ff4757; font-weight: 900;">AMINOĞLU PORTAL</h1>
        <div class="row g-4">
            <div class="col-6 col-md-3"><div class="menu-card" onclick="openApp('ictasPage')"><div class="icon-box">🔳</div><h5 class="fw-bold">İçtaş Barkod</h5></div></div>
            <div class="col-6 col-md-3"><div class="menu-card" onclick="openApp('idrisPage')"><div class="icon-box">📊</div><h5 class="fw-bold">İdis Barkod</h5></div></div>
            <div class="col-6 col-md-3"><div class="menu-card" onclick="openApp('readPage')"><div class="icon-box">🔍</div><h5 class="fw-bold">Barkod İçerik</h5></div></div>
            <div class="col-6 col-md-3"><div class="menu-card" onclick="openApp('calcPage')"><div class="icon-box">⚖️</div><h5 class="fw-bold">Çubuk Sayısı</h5></div></div>
        </div>
    </div>

    <div id="calcPage" class="app-page">
        <button class="back-btn" onclick="showMenu()">← Ana Menü</button>
        <div class="card bg-dark p-4 border-0 shadow-lg">
            <h3 class="text-center mb-4 text-info">Çubuk Sayısı Hesapla</h3>
            
            <div class="mb-4">
                <label class="calc-label">Demir Çapı (mm)</label>
                <select id="cap" class="form-select form-select-lg"></select>
            </div>

            <div class="mb-4">
                <label class="calc-label">Demir Boyu (Metre)</label>
                <div class="input-group">
                    <input type="number" id="boyManuel" class="form-control form-control-lg text-center" placeholder="Örn: 12.70" step="0.01">
                    <span class="input-group-text input-group-text-custom">m</span>
                </div>
            </div>

            <div class="mb-5">
                <label class="calc-label">Toplam Ağırlık (Kilogram)</label>
                <div class="input-group">
                    <input type="number" id="kgInput" class="form-control form-control-lg text-center" placeholder="Örn: 2500">
                    <span class="input-group-text input-group-text-custom">kg</span>
                </div>
                <small class="text-muted d-block mt-2">Not: 1 Ton için 1000 yazın.</small>
            </div>

            <button onclick="calc()" class="btn btn-action">HESAPLA 🧮</button>
            
            <div id="calcRes" class="text-center mt-4 p-4 rounded-3" style="display:none; background: #222; border: 2px dashed #ff4757;">
                <h1 id="resVal" style="color: #ff4757; font-weight: 900; font-size: 3.5rem;"></h1>
                <span class="text-muted fw-bold">ADET TAHMİNİ</span>
            </div>
        </div>
    </div>

    <div id="ictasPage" class="app-page"><button class="back-btn" onclick="showMenu()">← Ana Menü</button><div class="card bg-dark p-4 border-0"><h3 class="text-center mb-4">İçtaş Barkod</h3><input type="text" id="ictasInput" class="form-control form-control-custom mb-4" placeholder="Numarayı Yazın"><button onclick="genQR()" class="btn btn-action">QR OLUŞTUR</button><div id="qrOut" class="text-center mt-3" style="display:none;"><div class="barcode-area" id="qrcode"></div></div></div></div>
    <div id="idrisPage" class="app-page"><button class="back-btn" onclick="showMenu()">← Ana Menü</button><div class="card bg-dark p-4 border-0"><h3 class="text-center mb-4">İdis Barkod</h3><input type="text" id="idrisInput" class="form-control form-control-custom mb-4" placeholder="Numarayı Yazın"><button onclick="genPDF()" class="btn btn-action">PDF417 OLUŞTUR</button><div id="pdfOut" class="text-center mt-3" style="display:none;"><div class="barcode-area"><canvas id="pdfCanvas"></canvas></div></div></div></div>
    <div id="readPage" class="app-page"><button class="back-btn" onclick="showMenu()">← Ana Menü</button><div class="card bg-dark p-4 border-0 text-center"><h3 class="mb-4">Barkod Oku</h3><div id="reader"></div><button onclick="initScanner()" class="btn btn-info w-100 p-3 mb-3 fw-bold">📸 KAMERAYI AÇ</button><div id="scanRes" class="p-4 bg-secondary rounded-3 mt-3" style="display:none;"><p class="mb-1 text-light">İçerik:</p><h2 id="scannedData"></h2></div></div></div>
</div>

<script>
    function openApp(id) { document.getElementById('mainMenu').style.display = 'none'; document.getElementById(id).style.display = 'block'; }
    function showMenu() { document.querySelectorAll('.app-page').forEach(p => p.style.display = 'none'); document.getElementById('mainMenu').style.display = 'block'; if(window.html5QrCode) window.html5QrCode.stop().catch(()=>{}); }

    // Çap Listesi
    const capS = document.getElementById('cap');
    for(let i=8;i<=20;i+=0.5) capS.options.add(new Option(i+" mm", i));
    for(let i=22;i<=50;i+=2) capS.options.add(new Option(i+" mm", i));

    function calc() {
        let c = parseFloat(document.getElementById('cap').value); 
        let b = parseFloat(document.getElementById('boyManuel').value); 
        let kg = parseFloat(document.getElementById('kgInput').value);

        if(!b || !kg) return alert("Lütfen boy ve ağırlık bilgilerini girin!");
        
        let birimAgirlik = (c * c) / 162.15;
        let sonuc = Math.floor(kg / (b * birimAgirlik));
        
        document.getElementById('resVal').innerText = sonuc;
        document.getElementById('calcRes').style.display = 'block';
        document.activeElement.blur();
    }

    // Üretim ve Okuma Kodları...
    function genQR() { let v = document.getElementById('ictasInput').value; document.getElementById('qrcode').innerHTML = ""; new QRCode(document.getElementById('qrcode'), {text: v, width: 220, height: 220}); document.getElementById('qrOut').style.display = 'block'; }
    function genPDF() { let v = document.getElementById('idrisInput').value; bwipjs.toCanvas('pdfCanvas', {bcid:'pdf417', text:v, scale:3, height:12}); document.getElementById('pdfOut').style.display = 'block'; }
    function initScanner() { document.getElementById('reader').style.display = 'block'; window.html5QrCode = new Html5Qrcode("reader"); window.html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => { document.getElementById('scannedData').innerText = text; document.getElementById('scanRes').style.display = 'block'; window.html5QrCode.stop(); }); }
</script>
</body>
</html>
