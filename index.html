<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amınoğlu Metal Portal v4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bwip-js@3.0.4/dist/bwip-js-min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; }
        .menu-card { background: linear-gradient(145deg, #1e1e1e, #141414); border: 1px solid #333; border-radius: 20px; transition: 0.3s; cursor: pointer; padding: 30px; text-align: center; height: 100%; }
        .menu-card:hover { transform: translateY(-5px); border-color: #ff4757; box-shadow: 0 10px 20px rgba(255, 71, 87, 0.2); }
        .icon { font-size: 3rem; margin-bottom: 15px; display: block; }
        .app-page { display: none; padding-top: 20px; }
        .back-btn { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 10px; margin-bottom: 20px; }
        .btn-main { background: #ff4757; color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; width: 100%; font-size: 1.1rem; }
        .form-control-custom { background: white !important; color: black !important; border-radius: 12px; padding: 15px; font-size: 1.2rem; font-weight: bold; border: 2px solid #ff4757; }
        .barcode-area { background: white; padding: 20px; border-radius: 15px; display: inline-block; margin-top: 20px; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container py-4">
    <div id="mainMenu">
        <h2 class="text-center mb-5" style="color: #ff4757; font-weight: 800;">AMINOĞLU METAL PORTAL</h2>
        <div class="row g-4">
            <div class="col-6 col-md-3"><div class="menu-card" onclick="openApp('app1')"><span class="icon">🔳</span>İçtaş QR Türet</div></div>
            <div class="col-6 col-md-3"><div class="menu-card" onclick="openApp('app2')"><span class="icon">🚥</span>İdris PDF417</div></div>
            <div class="col-6 col-md-3"><div class="menu-card" onclick="openApp('app3')"><span class="icon">🔍</span>Barkod Oku</div></div>
            <div class="col-6 col-md-3"><div class="menu-card" onclick="openApp('app4')"><span class="icon">🧮</span>Adet Hesapla</div></div>
        </div>
    </div>

    <div id="app1" class="app-page">
        <button class="back-btn" onclick="showMenu()">← Ana Menü</button>
        <div class="card bg-dark p-4 border-secondary">
            <h4 class="text-center mb-4">İçtaş QR Oluşturucu</h4>
            <input type="text" id="ictasInput" class="form-control form-control-custom mb-3" placeholder="Numarayı buraya yapıştır">
            <button onclick="makeQR()" class="btn btn-main">KAREKOD ÜRET 🚀</button>
            <div id="qrRes" class="text-center mt-3" style="display:none;"><div id="qrcode" class="barcode-area"></div></div>
        </div>
    </div>

    <div id="app2" class="app-page">
        <button class="back-btn" onclick="showMenu()">← Ana Menü</button>
        <div class="card bg-dark p-4 border-secondary">
            <h4 class="text-center mb-4">İdris PDF417 Oluşturucu</h4>
            <input type="text" id="idrisInput" class="form-control form-control-custom mb-3" placeholder="Numarayı buraya yapıştır">
            <button onclick="makePDF()" class="btn btn-main">İDRİS BARKODU ÜRET 🚀</button>
            <div id="pdfRes" class="text-center mt-3" style="display:none;"><div class="barcode-area"><canvas id="pdfCanvas"></canvas></div></div>
        </div>
    </div>

    <div id="app3" class="app-page">
        <button class="back-btn" onclick="showMenu()">← Ana Menü</button>
        <div class="card bg-dark p-4 border-secondary text-center">
            <h4 class="mb-4 text-warning">Barkod / Karekod Tarayıcı</h4>
            <div id="reader"></div>
            <button onclick="startScan()" class="btn btn-outline-info w-100 mb-3">📸 Kamerayı Başlat</button>
            <div id="scanResult" class="p-3 bg-secondary rounded mt-2" style="display:none;">
                <p class="mb-1">Okunan Veri:</p>
                <h3 id="scannedText" class="text-white fw-bold"></h3>
            </div>
        </div>
    </div>

    <div id="app4" class="app-page">
        <button class="back-btn" onclick="showMenu()">← Ana Menü</button>
        <div class="card bg-dark p-4 border-secondary">
            <h4 class="text-center mb-4 text-info">Çubuk Demir Hesaplayıcı</h4>
            <div class="mb-3"><label>Çap (mm)</label><select id="cap" class="form-select form-control-lg"></select></div>
            <div class="mb-3"><label>Boy (m)</label><select id="boy" class="form-select form-control-lg"></select></div>
            <div class="mb-3"><label>Tonaj (Ton)</label><input type="number" id="ton" class="form-control form-control-lg"></div>
            <button onclick="doCalc()" class="btn btn-main mt-2">HESAPLA</button>
            <h2 id="calcRes" class="text-center mt-4 text-warning fw-bold"></h2>
        </div>
    </div>
</div>

<script>
    // Menü Yönetimi
    function openApp(id) {
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById(id).style.display = 'block';
    }
    function showMenu() {
        document.querySelectorAll('.app-page').forEach(p => p.style.display = 'none');
        document.getElementById('mainMenu').style.display = 'block';
        if(window.scanner) window.scanner.clear();
    }

    // Listeler
    const capS = document.getElementById('cap'); const boyS = document.getElementById('boy');
    for(let i=8;i<=20;i+=0.5) capS.options.add(new Option(i+" mm", i));
    for(let i=22;i<=50;i+=2) capS.options.add(new Option(i+" mm", i));
    for(let i=6;i<=18;i++) boyS.options.add(new Option(i+" m", i));

    // QR ve PDF417 Üretme
    function makeQR() {
        let val = document.getElementById('ictasInput').value.trim();
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById('qrcode'), { text: val, width: 220, height: 220 });
        document.getElementById('qrRes').style.display = 'block';
    }
    function makePDF() {
        let val = document.getElementById('idrisInput').value.trim();
        bwipjs.toCanvas('pdfCanvas', { bcid: 'pdf417', text: val, scale: 3, height: 12 });
        document.getElementById('pdfRes').style.display = 'block';
    }

    // Barkod Okuma (Scanner)
    function startScan() {
        window.scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        window.scanner.render((text) => {
            document.getElementById('scannedText').innerText = text;
            document.getElementById('scanResult').style.display = 'block';
            window.scanner.clear();
        });
    }

    // Hesaplama
    function doCalc() {
        let c = document.getElementById('cap').value, b = document.getElementById('boy').value, t = document.getElementById('ton').value;
        let res = Math.floor((t*1000) / (b * (c*c/162.15)));
        document.getElementById('calcRes').innerText = res + " ADET";
    }
</script>
</body>
</html>
